 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Carousel</title>
 <!--Bootstrap Links-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous">
        </script>

        <style>
            body {
                height: 100%; width: 100%; margin: 0; padding: 0;
                background-color: var(--bs-dark)
            }
            .carousel-item {
  transition: transform 0s ease-in-out !important;
}
        </style>
</head>
<body>
    <div id="carouselExampleFade" class="carousel" data-bs-ride="carousel" data-bs-pause="false">
  <div class="carousel-inner">
    <div class="carousel-item active" data-bs-interval="4000" >
      <img src="./menu-board/gerkies-pizza-pop-up-4-menu-board-title.png" class="d-block w-100" alt="Gerkies Pizza Pop-Up Menu Board">
    </div>
    <div class="carousel-item" data-bs-interval="15000">
      <img src="./menu-board/gerkies-pizza-pop-up-4-menu-board-1.png" class="d-block w-100" alt="Gerkies Pizza Pop-Up Menu Board">
    </div>
  </div>
</div>
</body>
</html>
