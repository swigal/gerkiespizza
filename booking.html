  <section class="container-lg pt-3">
    <h2 id="booking-form">Book your pop-up today!</h2>
    <form class="row was-validated" action="https://formspree.io/f/mnjwbgep" method="POST" id="bookingForm"
      target="_blank">
      <div class="row mb-3">
        <div class="col-6">
          <label for="name" class="form-label">Full Name</label>
          <input type="text" class="form-control" id="name" name="name" placeholder="Your Name" required>
        </div>
        <div class="col-6">
          <label for="phone" class="form-label">Phone</label>
          <input type="tel" class="form-control" id="phone" name="phone" placeholder="Your Phone Number" required>
        </div>
      </div>
      <div class="row mb-3">
        <div class="col-12">
          <label for="email" class="form-label">Email</label>
          <input type="email" class="form-control" id="email" name="email" placeholder="Your Email" required>
        </div>
      </div>
      <div class="row mb-3">
        <div class="col-6">
          <label for="date" class="form-label">Preferred Date</label>
          <input type="date" class="form-control" id="date" name="date" required>
        </div>
        <div class="col-6">
          <label for="guests" class="form-label">Estimated Attendance</label>
          <input type="number" class="form-control" id="guests" name="guests" placeholder="Number of Guests" required>
        </div>
      </div>
      <div class="row mb-3">
        <div class="col-12">
          <label for="eventType" class="form-label">Event Type</label>
          <select id="eventType" class="form-select" name="eventType" required>
            <option selected disabled value="">Choose...</option>
            <option value="private">Private Event</option>
            <option value="corporate">Corporate Event</option>
            <option value="festival">Festival / Market</option>
            <option value="other">Other</option>
          </select>
        </div>
      </div>
      <div class="row mb-3">
        <div class="col-12">
          <label for="location" class="form-label">Event Location</label>
          <input type="text" class="form-control" id="location" name="location" placeholder="Venue or Address" required>
        </div>
      </div>
      <div class="mb-3 row ">
        <div class="col-12">
          <label for="message" class="form-label">Message</label>
          <textarea class="form-control" id="message" name="message" rows="4" placeholder="Tell us about your event..."
            required></textarea>
        </div>
      </div>
      <div class="mb-3 row">
        <div class="col-12">
          <button type="submit" class="btn-gp btn-gp-primary">Book Now!</button>
        </div>
      </div>
    </form>
  </section>
